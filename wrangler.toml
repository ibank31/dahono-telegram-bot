name = "crimson-brook-1413"
main = "worker.js"
compatibility_date = "2026-06-15"

# ── KV Namespace untuk history percakapan ──────────────────────
# Setup: jalankan perintah ini sekali di terminal:
#   npx wrangler kv:namespace create HISTORY_KV
# Lalu isi "id" di bawah dengan output dari perintah tersebut.
[[kv_namespaces]]
binding = "HISTORY_KV"
id = "d7393d2de8044883810fc43ae995fc3e"

# ── Variabel environment ───────────────────────────────────────
# Rahasia (TOKEN, KEY) → set via Cloudflare dashboard > Settings > Variables
# supaya tidak masuk ke version control.
# Var opsional bisa diset di sini:

[vars]
DEFAULT_BRANCH = "main"

# ==========================
# AI MODEL ROUTER
# ==========================

MODEL_DEFAULT = "dahono/claude-sonnet-4.5-agentic-free"

MODEL_AUDIT = "dahono/claude-sonnet-4.5-thinking-free"

MODEL_PLANNER = "dahono/claude-sonnet-4.5-thinking-agentic-free"

MODEL_CODER = "dahono/qwen3-coder-plus"

MODEL_FAST = "dahono/qwen3.6-flash"

MODEL_REPO = "dahono/claude-sonnet-4.5-agentic-free"

MODEL_SEO = "dahono/claude-sonnet-4.5-thinking-free"

MODEL_DEBUG = "dahono/claude-sonnet-4.5-thinking-agentic-free"

# ALLOWED_CHAT_IDS = "123456789,987654321"
